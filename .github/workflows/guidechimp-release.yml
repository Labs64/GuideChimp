name: GuideChimp - Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.2.1) or bump type (patch, minor, major)'
        required: true
        default: 'patch'
      release_notes:
        description: 'Release notes вЂ” leave blank to auto-generate from commits/PRs'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # в”Ђв”Ђ Checkout Repositories в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout GuideChimp
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Read Plugins version from package.json
        id: plugins_version
        run: |
          # Replaces the outdated notiz-dev 3rd-party action with a fast native script
          PLUGINS_VER=$(node -p "require('./package.json').plugins['guidechimp-plugins']")
          echo "version=$PLUGINS_VER" >> $GITHUB_OUTPUT
          echo "вњ… Found plugin version: $PLUGINS_VER"

      - name: Checkout GuideChimp Plugins (v${{ steps.plugins_version.outputs.version }})
        uses: actions/checkout@v5
        with:
          repository: Labs64/GuideChimp-plugins
          path: guidechimp-plugins
          ref: ${{ steps.plugins_version.outputs.version }}
          token: ${{ secrets.GUIDECHIMP_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      # в”Ђв”Ђ Guards в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Validate version input
        run: |
          INPUT="${{ inputs.version }}"
          if echo "$INPUT" | grep -Pq '^(patch|minor|major)$'; then
            echo "вњ… Bump type: $INPUT"
          elif echo "$INPUT" | grep -Pq '^\d+\.\d+\.\d+(-[\w.]+)?(\+[\w.]+)?$'; then
            echo "вњ… Explicit version: $INPUT"
          else
            echo "вќЊ '$INPUT' is neither a bump type (patch/minor/major) nor valid semver"
            exit 1
          fi

      - name: Check version not already tagged
        run: |
          INPUT="${{ inputs.version }}"
          if echo "$INPUT" | grep -Pq '^\d+'; then
            if git ls-remote --tags origin | grep -q "refs/tags/${INPUT}$"; then
              echo "вќЊ Tag ${INPUT} already exists вЂ” bump the version or delete the tag first"
              exit 1
            fi
          fi

      # в”Ђв”Ђ Install & Test GuideChimp в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install dependencies
        run: npm ci

      - name: Check outdated dependencies
        run: npm outdated || true

      - name: Run tests
        env:
          GUIDECHIMP_PRIVATE_KEY: ${{ secrets.GUIDECHIMP_PRIVATE_KEY }}
          GUIDECHIMP_PUBLIC_KEY: ${{ secrets.GUIDECHIMP_PUBLIC_KEY }}
        run: npm run test

      # в”Ђв”Ђ Git: configure and bump version before build в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bump version and tag
        id: bump
        run: |
          npm version ${{ inputs.version }} --tag-version-prefix="" -m "Release %s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git push --follow-tags

      # в”Ђв”Ђ Build Core & Plugins в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # ensure the dist directory is completely fresh before building anything
      - name: Clean existing dist
        run: |
          echo "Removing any leftover files from previous releases"
          rm -rf dist/* || true

      - name: Build GuideChimp Core
        run: npm run build --if-present

      - name: Build GuideChimp Plugins
        working-directory: ./guidechimp-plugins
        run: |
          npm ci
          npm run build --if-present

      - name: Sync Plugins to GuideChimp dist
        run: |
          mkdir -p dist/plugins
          # --delete makes sure removed/renamed files in plugins/dist are cleared
          rsync -av --delete guidechimp-plugins/dist/ dist/plugins/
          ls -la -R dist/

      # в”Ђв”Ђ Publish в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          body: ${{ inputs.release_notes }}
          generate_release_notes: ${{ inputs.release_notes == '' }}
          files: dist/**
