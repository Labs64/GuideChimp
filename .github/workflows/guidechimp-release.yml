name: GuideChimp - Release

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:

  publish-npm:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout GuideChimp
        uses: actions/checkout@v4
        with:
          path: guidechimp

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm
          cache-dependency-path: guidechimp/package-lock.json

      - name: Read GuideChimp Plugins version
        id: guidechimp_plugins_version
        run: |
          PLUGINS_VERSION=$(node -e "const p = require('./guidechimp/package.json'); const v = p.plugins && p.plugins['guidechimp-plugins']; if (!v) { process.stderr.write('plugins.guidechimp-plugins not found in package.json\n'); process.exit(1); } console.log(v);")
          echo "prop=$PLUGINS_VERSION" >> $GITHUB_OUTPUT

      - name: Checkout GuideChimp Plugins (v${{steps.guidechimp_plugins_version.outputs.prop}})
        uses: actions/checkout@v4
        with:
          path: guidechimp-plugins
          repository: Labs64/GuideChimp-plugins
          ref: ${{steps.guidechimp_plugins_version.outputs.prop}}
          token: ${{ secrets.GUIDECHIMP_PAT }}

      - name: Build and test package
        run: |
          cd guidechimp
          npm ci
          npm run build --if-present
          npm test
          ls -la -R dist/
          cd ../guidechimp-plugins
          npm ci
          npm run build --if-present
          ls -la -R dist/
          rsync -av dist/ ../guidechimp/dist/plugins
        env:
          GUIDECHIMP_PRIVATE_KEY: ${{secrets.GUIDECHIMP_PRIVATE_KEY}}
          GUIDECHIMP_PUBLIC_KEY: ${{secrets.GUIDECHIMP_PUBLIC_KEY}}

      - name: Publish to npmjs.org
        run: |
          cd guidechimp
          ls -la -R dist
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
